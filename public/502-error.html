<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>502 Bad Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #09090b 0%, #18181b 50%, #09090b 100%);
        }
        .glow {
            box-shadow: 0 0 60px rgba(59, 130, 246, 0.15);
        }
        .pulse-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="bg-zinc-900/80 border border-zinc-800 rounded-2xl p-8 glow backdrop-blur-sm">
            <!-- Error Icon -->
            <div class="flex justify-center mb-6">
                <div class="w-20 h-20 bg-red-500/10 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
            </div>

            <!-- Error Code -->
            <div class="text-center mb-4">
                <h1 class="text-6xl font-bold text-red-500 mb-2">502</h1>
                <p class="text-xl font-semibold text-zinc-200">Bad Gateway</p>
            </div>

            <!-- Description -->
            <div class="text-center mb-8">
                <p class="text-zinc-400 text-sm leading-relaxed">
                    Сервер временно недоступен. Мы уже работаем над решением проблемы. Попробуйте обновить страницу через несколько минут.
                </p>
            </div>

            <!-- Discord Section -->
            <div class="bg-zinc-800/50 rounded-xl p-6 border border-zinc-700/50">
                <div class="flex items-center gap-3 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-indigo-400" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                    </svg>
                    <span class="text-zinc-200 font-semibold">Нужна помощь?</span>
                </div>
                
                <p class="text-zinc-400 text-sm mb-4">
                    Если проблема не решается, напишите нам в Discord
                </p>

                <a href="https://discord.gg/ggwEA5rrtC" target="_blank" rel="noopener noreferrer" class="block w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-4 rounded-lg text-center transition-colors duration-200 mb-3">
                    Присоединиться к серверу
                </a>

                <div class="text-center">
                    <p class="text-zinc-500 text-xs">
                        Связаться с разработчиком: <span class="text-indigo-400 font-medium">@fa4ar</span>
                    </p>
                </div>
            </div>

            <!-- Refresh Button -->
            <button onclick="window.location.reload()" class="mt-6 w-full bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-medium py-3 px-4 rounded-lg transition-colors duration-200 border border-zinc-700">
                Обновить страницу
            </button>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6">
            <p class="text-zinc-600 text-xs">
                Compass CAD • California Travel RP
            </p>
        </div>
    </div>
</body>
</html>
