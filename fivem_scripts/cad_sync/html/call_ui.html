<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAD 911 Call</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-main: 'Roboto', sans-serif;
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --border: #2a2a2a;
            --text-main: #e5e5e5;
            --text-muted: #737373;
            --accent: #3b82f6;
            --priority-high: #ef4444;
            --priority-medium: #f59e0b;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }
        body { background: transparent; overflow: hidden; }
        
        /* Call Card - Left Side - Minimal */
        #call-card {
            position: fixed;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            width: 220px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s;
            padding: 8px 10px;
            font-size: 11px;
        }
        
        #call-card.show { opacity: 1; visibility: visible; }
        #call-card.hide { opacity: 0; visibility: hidden; }
        
        #call-card .id {
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 2px;
        }
        
        #call-card .location {
            color: var(--text-muted);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        #call-card .description {
            color: var(--text-muted);
            font-size: 10px;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        #call-card .meta {
            display: flex;
            gap: 8px;
            color: var(--text-muted);
            font-size: 10px;
        }
        
        #call-card .priority {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 2px;
            font-size: 9px;
            font-weight: 600;
        }
        
        #call-card .priority.high { background: rgba(239, 68, 68, 0.2); color: var(--priority-high); }
        #call-card .priority.medium { background: rgba(245, 158, 11, 0.2); color: var(--priority-medium); }
        
        /* Toast - Minimal */
        #toast-notification {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 200px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            z-index: 2000;
            transform: translateX(120%);
            opacity: 0;
            transition: transform 0.2s, opacity 0.2s;
            padding: 8px 10px;
            font-size: 11px;
        }
        
        #toast-notification.show { transform: translateX(0); opacity: 1; }
        
        #toast-notification .title {
            color: var(--text-muted);
            font-size: 9px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        
        #toast-notification .type {
            color: var(--text-main);
            font-weight: 500;
        }
        
        #toast-notification .location {
            color: var(--text-muted);
            font-size: 10px;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <!-- Call Card - Left Side -->
    <div id="call-card" class="hide">
        <div class="id" id="card-id">#0000</div>
        <div class="location" id="card-location">-</div>
        <div class="description" id="card-description">-</div>
        <div class="meta">
            <span class="priority" id="card-priority">-</span>
            <span id="card-time">-</span>
        </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast-notification" class="hidden">
        <div class="title">Новый вызов</div>
        <div class="type" id="toast-type">-</div>
        <div class="location" id="toast-location">-</div>
    </div>
    
    <script>
        const CallUI = {
            currentCall: null,
            toastTimeout: null,
            
            typeLabels: {
                traffic_accident: "ДТП", disturbance: "Нарушение", robbery: "Ограбление",
                assault: "Нападение", domestic: "Семейный", welfare_check: "Проверка",
                suspicious: "Подозрительно", fire: "Пожар", medical: "Медицина",
                accident: "Авария", other: "Другое"
            },
            
            getTypeLabel(type) { return this.typeLabels[type] || type || '-'; },
            
            formatTime(ts) {
                if (!ts) return '-';
                const diff = Date.now() - ts;
                const mins = Math.floor(diff / 60000);
                if (mins > 0) return mins + 'м';
                return 'сейчас';
            },
            
            showCall(call) {
                this.currentCall = call;
                document.getElementById('card-id').textContent = '#' + call.id;
                document.getElementById('card-location').textContent = call.location || '-';
                document.getElementById('card-description').textContent = call.description || '-';
                document.getElementById('card-time').textContent = this.formatTime(call.createdAt);
                
                const badge = document.getElementById('card-priority');
                if (call.priority === 'high' || call.priority === 'emergency') {
                    badge.className = 'priority high';
                    badge.textContent = 'ВАЖНО';
                } else if (call.priority === 'medium') {
                    badge.className = 'priority medium';
                    badge.textContent = 'СРЕДН';
                } else {
                    badge.className = 'priority';
                    badge.textContent = 'ОБЫЧН';
                }
                
                document.getElementById('call-card').classList.remove('hide');
                document.getElementById('call-card').classList.add('show');
            },
            
            hideCall() {
                document.getElementById('call-card').classList.remove('show');
                document.getElementById('call-card').classList.add('hide');
                this.currentCall = null;
            },
            
            showToast(call) {
                document.getElementById('toast-type').textContent = this.getTypeLabel(call.type);
                document.getElementById('toast-location').textContent = call.location || '-';
                
                const toast = document.getElementById('toast-notification');
                toast.classList.remove('show');
                void toast.offsetWidth;
                toast.classList.add('show');
                
                if (this.toastTimeout) clearTimeout(this.toastTimeout);
                this.toastTimeout = setTimeout(() => toast.classList.remove('show'), 4000);
            },
            
            updateCall(call) { this.showCall(call); }
        };
        
        window.addEventListener('message', function(e) {
            const d = e.data;
            if (!d || !d.action) return;
            
            if (d.action === 'toast') CallUI.showToast(d.call);
            else if (d.action === 'showCall') CallUI.showCall(d.call);
            else if (d.action === 'hideCall') CallUI.hideCall();
            else if (d.action === 'updateCall') CallUI.updateCall(d.call);
            else if (d.action === 'newCall') CallUI.showToast(d.call);
        });
        
        console.log('[CAD-911] Ready');
    </script>
</body>
</html>
