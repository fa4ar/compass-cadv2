<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAD Sync - Call Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Call Card -->
    <div id="call-card" class="call-card hidden">
        <div class="call-id">#<span id="call-id-value">0</span></div>
        <div class="call-type" id="call-type-value">Unknown</div>
        <div class="call-phone" id="call-phone-value">Unknown</div>
        <div class="call-address" id="call-address-value">Unknown</div>
        <div class="call-description" id="call-description-value">No description</div>
        <div class="call-status" id="call-status-value">Active</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
